<script>
function fmt(n) { return Math.round(n).toLocaleString() + '??; }

function calcLoan() {
  const p = parseFloat(document.getElementById('loanAmount').value) * 10000;
  const n = parseInt(document.getElementById('loanTerm').value);
  const r = parseFloat(document.getElementById('loanRate').value) / 100 / 12; // ?붿씠?먯쑉
  const type = document.getElementById('repayType').value;

  if(!p || !n || !r) { alert("紐⑤뱺 媛믪쓣 ?щ컮瑜닿쾶 ?낅젰?댁＜?몄슂."); return; }

  let monthlyFirst = 0;
  let totalInt = 0;

  if(type === 'equal_all') {
    // ?먮━湲덇퇏??    const payment = p * r * Math.pow(1+r, n) / (Math.pow(1+r, n) - 1);
    monthlyFirst = payment;
    totalInt = (payment * n) - p;
    document.getElementById('monthlyLabel').textContent = "留ㅼ썡 ?곹솚??;
  } else if(type === 'equal_prin') {
    // ?먭툑洹좊벑
    const principalPay = p / n;
    monthlyFirst = principalPay + (p * r);
    // 珥앹씠??= ?먭툑 * ?댁쑉 * (媛쒖썡??1) / 2
    totalInt = p * r * (n + 1) / 2;
    document.getElementById('monthlyLabel').textContent = "泥????곹솚??(留ㅼ썡 媛먯냼)";
  } else if(type === 'bullet') {
    // 留뚭린?쇱떆
    monthlyFirst = p * r;
    totalInt = monthlyFirst * n;
    document.getElementById('monthlyLabel').textContent = "留ㅼ썡 ?곹솚??(?댁옄留?";
  }

  const totalRepay = p + totalInt;

  document.getElementById('monthlyPay').textContent = fmt(monthlyFirst);
  document.getElementById('totalInterest').textContent = fmt(totalInt);
  document.getElementById('totalRepay').textContent = fmt(totalRepay);

  const res = document.getElementById('resultArea');
  res.style.display = 'block';
  res.classList.add('scroll-reveal');
  setTimeout(()=>res.classList.add('visible'), 50);
}
