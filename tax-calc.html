function fmt(n) { return Math.round(n).toLocaleString() + '??; }

// Simplified income tax table (monthly gross in won)
function getIncomeTax(monthly, dependents) {
  const d = parseInt(dependents);
  // Simplified progressive rates
  if (monthly <= 1060000) return 0;
  if (monthly <= 1500000) return Math.round(monthly * 0.006);
  if (monthly <= 3000000) return Math.round(monthly * 0.015);
  if (monthly <= 4500000) return Math.round(monthly * 0.024);
  if (monthly <= 7800000) return Math.round(monthly * 0.035);
  if (monthly <= 12000000) return Math.round(monthly * 0.048);
  return Math.round(monthly * 0.062);
}

function calcSalary() {
  const annual = parseFloat(document.getElementById('salary').value) * 10000;
  if (!annual || annual <= 0) { alert('?곕큺???낅젰?댁＜?몄슂.'); return; }
  const dependents = document.getElementById('dependents').value;
  const monthly = annual / 12;

  const pension = Math.round(monthly * 0.045);
  const health = Math.round(monthly * 0.03545);
  const ltc = Math.round(health * 0.1295);
  const employment = Math.round(monthly * 0.009);
  const incomeTax = getIncomeTax(monthly, dependents);
  const localTax = Math.round(incomeTax * 0.1);
  const totalDeduction = pension + health + ltc + employment + incomeTax + localTax;
  const takeHome = monthly - totalDeduction;

  document.getElementById('monthlyGross').textContent = fmt(monthly);
  document.getElementById('pension').textContent = '-' + fmt(pension);
  document.getElementById('health').textContent = '-' + fmt(health);
  document.getElementById('ltc').textContent = '-' + fmt(ltc);
  document.getElementById('employment').textContent = '-' + fmt(employment);
  document.getElementById('incomeTax').textContent = '-' + fmt(incomeTax);
  document.getElementById('localTax').textContent = '-' + fmt(localTax);
  document.getElementById('totalDeduction').textContent = '-' + fmt(totalDeduction);
  document.getElementById('takeHome').textContent = fmt(takeHome);
  document.getElementById('yearlyTake').textContent = Math.round(takeHome * 12 / 10000).toLocaleString() + '留?;
  document.getElementById('taxRate').textContent = (totalDeduction / monthly * 100).toFixed(1) + '%';

}
