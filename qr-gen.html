<script>
let qrcodeObj = null;

function generateQR() {
  const text = document.getElementById('qrText').value;
  if(!text) { alert("URL?대굹 ?띿뒪?몃? ?낅젰?댁＜?몄슂."); return; }
  
  const qrDiv = document.getElementById('qrcode');
  qrDiv.innerHTML = ""; // 珥덇린??  
  qrcodeObj = new QRCode(qrDiv, {
    text: text,
    width: 256,
    height: 256,
    colorDark : "#000000",
    colorLight : "#ffffff",
    correctLevel : QRCode.CorrectLevel.H
  });
  
  const res = document.getElementById('qrResult');
  res.style.display = 'block';
  res.classList.add('scroll-reveal');
  setTimeout(()=>res.classList.add('visible'), 50);
}

function downloadQR() {
  const img = document.querySelector('#qrcode img');
  if(!img || !img.src) {
    // 媛꾪샊 img ?뚮뜑留???canvas留??덈뒗 寃쎌슦 ?鍮?    const canvas = document.querySelector('#qrcode canvas');
    if(canvas) {
      const link = document.createElement('a');
      link.href = canvas.toDataURL("image/png");
      link.download = 'qrcode.png';
      link.click();
    }
    return;
  }
  const link = document.createElement('a');
  link.href = img.src;
  link.download = 'qrcode.png';
  link.click();
}
</script>
