<script>
const tt = document.getElementById('themeToggle');
if (localStorage.getItem('theme') === 'light') { document.body.classList.add('light'); tt.textContent = '?截?; }
tt.addEventListener('click', () => {
  document.body.classList.toggle('light');
  const isLight = document.body.classList.contains('light');
  tt.textContent = isLight ? '?截? : '?뙔';
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
});

// Set default dates
const today = new Date().toISOString().split('T')[0];
document.getElementById('ddayDate').value = today;
document.getElementById('startDate').value = today;
document.getElementById('endDate').value = today;
document.getElementById('baseDate').value = today;

const DAYS = ['?쇱슂??,'?붿슂??,'?붿슂??,'?섏슂??,'紐⑹슂??,'湲덉슂??,'?좎슂??];

function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

function calcDday() {
  const target = new Date(document.getElementById('ddayDate').value);
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = Math.round((target - now) / (1000*60*60*24));
  const name = document.getElementById('ddayName').value || '紐⑺몴??;
  
  let label;
  if (diff === 0) label = `?럦 ?ㅻ뒛??${name}?낅땲??`;
  else if (diff > 0) label = `?뱦 ${name}源뚯? D-${diff}`;
  else label = `?뱦 ${name}??媛) D+${Math.abs(diff)} 吏?ъ뒿?덈떎`;

  document.getElementById('ddayTitle').textContent = label;
  document.getElementById('ddayNum').textContent = Math.abs(diff).toLocaleString();
  document.getElementById('ddayWeeks').textContent = Math.abs(Math.floor(diff/7)).toLocaleString();
  document.getElementById('ddayMonths').textContent = Math.abs(Math.floor(diff/30)).toLocaleString();
  document.getElementById('ddayYears').textContent = Math.abs(Math.floor(diff/365)).toLocaleString();
  document.getElementById('ddayResult').style.display = 'block';
}

function calcDiff() {
  const s = new Date(document.getElementById('startDate').value);
  const e = new Date(document.getElementById('endDate').value);
  const diff = Math.round((e - s) / (1000*60*60*24));
  const absDiff = Math.abs(diff);
  document.getElementById('diffDays').textContent = absDiff.toLocaleString();
  document.getElementById('diffWeeks').textContent = Math.floor(absDiff/7).toLocaleString();
  document.getElementById('diffMonths').textContent = Math.floor(absDiff/30).toLocaleString();
  document.getElementById('diffYears').textContent = Math.floor(absDiff/365).toLocaleString();
  document.getElementById('diffResult').style.display = 'block';
}

function calcAdd() {
  const base = new Date(document.getElementById('baseDate').value);
  const y = parseInt(document.getElementById('addYears').value) || 0;
  const m = parseInt(document.getElementById('addMonths').value) || 0;
  const d = parseInt(document.getElementById('addDays').value) || 0;
  base.setFullYear(base.getFullYear() + y);
  base.setMonth(base.getMonth() + m);
  base.setDate(base.getDate() + d);
  const yy = base.getFullYear();
  const mm = String(base.getMonth()+1).padStart(2,'0');
  const dd = String(base.getDate()).padStart(2,'0');
  document.getElementById('addResultDate').textContent = `${yy}??${mm}??${dd}??;
  document.getElementById('addDayName').textContent = DAYS[base.getDay()];
  document.getElementById('addResult').style.display = 'block';
}
