<script>
// Theme
const tt = document.getElementById('themeToggle');
if (localStorage.getItem('theme') === 'light') { document.body.classList.add('light'); tt.textContent = '?截?; }
tt.addEventListener('click', () => {
  document.body.classList.toggle('light');
  const isLight = document.body.classList.contains('light');
  tt.textContent = isLight ? '?截? : '?뙔';
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
});

// Counter
const input = document.getElementById('textInput');

function updateCounts() {
  const text = input.value;
  const charCount = text.length;
  const charNoSpace = text.replace(/\s/g, '').length;
  const wordCount = text.trim() === '' ? 0 : text.trim().split(/\s+/).filter(w => w !== '').length;
  const sentenceCount = text.trim() === '' ? 0 : text.split(/[.!?]+/).filter(s => s.trim() !== '').length;
  const lineCount = text === '' ? 0 : text.split('\n').length;
  const byteCount = new Blob([text]).size;

  document.getElementById('charCount').textContent = charCount.toLocaleString();
  document.getElementById('charNoSpaceCount').textContent = charNoSpace.toLocaleString();
  document.getElementById('wordCount').textContent = wordCount.toLocaleString();
  document.getElementById('sentenceCount').textContent = sentenceCount.toLocaleString();
  document.getElementById('lineCount').textContent = lineCount.toLocaleString();
  document.getElementById('byteCount').textContent = byteCount.toLocaleString();

  // Progress bars
  const instaPct = Math.min((charCount / 2200) * 100, 100);
  const twitterPct = Math.min((charCount / 280) * 100, 100);
  document.getElementById('instaBar').style.width = instaPct + '%';
  document.getElementById('twitterBar').style.width = twitterPct + '%';
  document.getElementById('instaBar').style.background = instaPct > 90 ? 'linear-gradient(90deg,#ef4444,#f97316)' : 'linear-gradient(90deg,var(--primary),var(--accent))';
  document.getElementById('twitterBar').style.background = twitterPct > 90 ? 'linear-gradient(90deg,#ef4444,#f97316)' : 'linear-gradient(90deg,var(--accent),var(--secondary))';
  document.getElementById('instaProgress').textContent = `${charCount.toLocaleString()} / 2,200`;
  document.getElementById('twitterProgress').textContent = `${charCount.toLocaleString()} / 280`;
}

input.addEventListener('input', updateCounts);

function copyText() {
  navigator.clipboard.writeText(input.value).then(() => {
    const btn = document.querySelector('.btn-primary');
    btn.textContent = '??蹂듭궗??';
    setTimeout(() => btn.textContent = '?뱥 蹂듭궗', 2000);
  });
}

function clearText() {
  input.value = '';
  updateCounts();
}
</script>
